name: Build PS3SHH

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # O GitHub já se vira com a permissão aqui, relaxa
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar Python e Wget
        run: |
          sudo apt update
          sudo apt install -y python3 python-is-python3 wget

      - name: Baixar Toolchain (Binário Pronto)
        run: |
          wget https://github.com/bucanero/ps3toolchain/releases/download/ubuntu-latest-fad3b5fb/ps3dev-ubuntu-latest-2020-08-31.tar.gz
          sudo tar -xzf ps3dev-ubuntu-latest-2020-08-31.tar.gz -C /
          
      - name: Configurar Ambiente
        run: |
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "PSL1GHT=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
          echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH

      - name: Build PKG
        run: |
          # Aqui ele vai achar seus .c que o checkout trouxe
          make pkg

      - name: Upload do PKG
        uses: actions/upload-artifact@v4
        with:
          name: PS3SHH-Package
          path: "*.pkg"
