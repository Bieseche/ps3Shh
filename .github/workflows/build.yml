name: Build PS3SHH

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download ps3dev toolchain
        run: |
          wget -q https://github.com/bucanero/ps3toolchain/releases/download/ubuntu-latest-fad3b5fb/ps3dev-ubuntu-latest-2020-08-31.tar.gz
          sudo tar -xzf ps3dev-ubuntu-latest-2020-08-31.tar.gz -C /usr/local
          rm ps3dev-ubuntu-latest-2020-08-31.tar.gz

      - name: Instalar Python 2 via Deadsnakes
        run: |
          # Adiciona o PPA Deadsnakes para ter acesso ao Python 2.7 no Ubuntu 22.04
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt update
          sudo apt install -y python2.7 libelf-dev zlib1g-dev
          
          # Limpeza total dos links zoados (Too many levels of symbolic links)
          sudo rm -f /usr/bin/python
          sudo rm -f /usr/bin/python2
          
          # Cria os links novos apontando para o 2.7
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python2
          
          # Check de sanidade
          python --version

      - name: Set environment
        run: |
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "PSL1GHT=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
          echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH

      - name: Build PKG
        run: |
          # Garante que os scripts da SDK tenham permissão
          sudo chmod +x /usr/local/ps3dev/bin/*.py
          sudo chmod +x /usr/local/ps3dev/bin/fself
          
          # Se o ICON0.png estiver na pasta pkg, movemos para a raiz antes do clean
          if [ -f pkg/ICON0.png ]; then mv pkg/ICON0.png ./; fi
          
          make clean
          make pkg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3SHH-Package
          path: "*.pkg"
